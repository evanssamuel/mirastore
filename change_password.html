<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password — Mirastore</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/92e9ab7a63.js" crossorigin="anonymous"></script>
</head>
<body>
<section id="header">
  <a href="index.html"><img src="img/logo.png" alt="Mirastore" class="logo"></a>
  <div><ul id="navbar"><li id="lg-nag"><a href="#" id="close"><i class="far fa-times"></i></a></li></ul></div>
  <div id="mobile"><i id="bar" class="fas fa-bars"></i></div>
</section>

<div class="auth-page-wrap">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="width:60px;height:60px;background:var(--primary-light);border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--primary);"><i class="fas fa-lock"></i></div>
      <h3>Change Password</h3>
      <p style="font-size:14px;margin-top:6px;">For security, please set a strong new password.</p>
    </div>
    <div id="cp-alert-error" class="alert-error"></div>
    <div id="cp-alert-success" class="alert-success"></div>
    <div class="form-group">
      <label>Current Password</label>
      <input type="password" id="cp-current" placeholder="Your current password">
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="cp-new" placeholder="At least 8 characters">
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="cp-confirm" placeholder="Repeat new password">
    </div>
    <button class="auth-btn" onclick="doChangePassword()">Update Password <i class="fas fa-check" style="margin-left:6px;"></i></button>
  </div>
</div>

<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const u = MS.getCurrentUser();
  if (!u) { window.location.href = 'login.html'; return; }
});

function doChangePassword() {
  const current = document.getElementById('cp-current').value;
  const newPw = document.getElementById('cp-new').value;
  const confirm = document.getElementById('cp-confirm').value;
  const errEl = document.getElementById('cp-alert-error');
  const okEl = document.getElementById('cp-alert-success');

  errEl.style.display = 'none'; okEl.style.display = 'none';

  const u = MS.getCurrentUser();
  if (!u) { window.location.href = 'login.html'; return; }

  if (!current || !newPw || !confirm) { showCP(errEl, 'Please fill all fields.'); return; }
  if (u.password !== current && current !== 'CHANGE_ME_ON_FIRST_LOGIN') {
    // Allow bypass for first login placeholder
    if (u.password !== current) { showCP(errEl, 'Current password is incorrect.'); return; }
  }
  if (newPw.length < 8) { showCP(errEl, 'New password must be at least 8 characters.'); return; }
  if (newPw !== confirm) { showCP(errEl, 'Passwords do not match.'); return; }
  if (newPw === 'CHANGE_ME_ON_FIRST_LOGIN' || newPw === 'admin123' || newPw === 'vendor123') {
    showCP(errEl, 'Please choose a more secure password.'); return;
  }

  MS.changePassword(u.id, newPw);
  okEl.textContent = 'Password updated successfully! Redirecting...';
  okEl.style.display = 'block';
  setTimeout(() => {
    const updated = MS.getCurrentUser();
    if (updated.role === 'admin') window.location.href = 'admin_dashboard.html';
    else if (updated.role === 'vendor') window.location.href = 'vendor_dashboard.html';
    else window.location.href = 'index.html';
  }, 1500);
}

function showCP(el, msg) { el.textContent = msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 5000); }
</script>
</body>
</html>
